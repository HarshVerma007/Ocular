name: atlas
description: "Ocular — Smart Screenshot Finder"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # OCR & ML
  google_mlkit_text_recognition: ^0.15.1

  # Gallery access
  photo_manager: ^3.6.3

  # Typography
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Permissions
  permission_handler: ^11.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
